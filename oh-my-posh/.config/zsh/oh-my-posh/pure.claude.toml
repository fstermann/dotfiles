# Source: https://github.com/JanDeDobbeleer/oh-my-posh/blob/main/themes/pure.omp.json
"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
console_title_template = "{{if .Root}}(Admin){{end}} {{.PWD}}"
version = 4

[[blocks]]
alignment = "left"
type = "prompt"

  [[blocks.segments]]
  foreground = "#BF616A"
  style = "plain"
  template = "{{ .UserName }} "
  type = "session"

  [[blocks.segments]]
  foreground = "#81A1C1"
  style = "plain"
  template = "{{ .Path }} "
  type = "path"

    [blocks.segments.options]
    style = "full"

[[blocks]]
alignment = "left"
type = "prompt"

  [[blocks.segments]]
  foreground = "#6C6C6C"
  style = "plain"
  template = "{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}<#FFAFD7>*</>{{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} \uf046 {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} \ueb4b {{ .StashCount }}{{ end }} "
  type = "git"

    [blocks.segments.options]
    branch_ahead_icon = "<#88C0D0>⇡ </>"
    branch_behind_icon = "<#88C0D0>⇣ </>"
    branch_icon = ""
    fetch_status = true
    fetch_upstream_icon = true
    github_icon = ""

[[blocks]]
alignment = "left"
type = "prompt"

  [[blocks.segments]]
  foreground = "#A3BE8C"
  style = "plain"
  template = " {{ .FormattedMs }} "
  type = "executiontime"

    [blocks.segments.options]
    style = "austin"

[[blocks]]
alignment = "left"
type = "prompt"

  [[blocks.segments]]
  foreground = "#6C6C6C"
  style = "plain"
  template = "• [{{ .Model.DisplayName }}] <#A3BE8C>{{ .TokenUsagePercent.GaugeUsed }}</> <#BF616A>{{ .FormattedCost }}</> "
  type = "claude"
